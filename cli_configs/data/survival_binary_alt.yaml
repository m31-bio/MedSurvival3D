# @package _global_
data:
  module:
    _target_: medsurvival3d.data.datamodules.COCACombinedB2NDDataModule
    name: Survival_Alt_High_v_Low_v2
    data_root_dir: ${data_dir}/survival_dataset
    batch_size: 12
    train_transforms:
      _target_: medsurvival3d.data.batchgenerators_transforms.get_training_transforms
      patch_size: ${data.patch_size}
      rotation_for_DA: 0.523599
      mirror_axes: [0,1,2]
      do_dummy_2d_data_aug: false
    test_transforms:
      _target_: medsurvival3d.data.batchgenerators_transforms.get_test_transforms
      patch_size: ${data.patch_size}
      do_dummy_2d_data_aug: false
    fold: 0
    data_subdir: images
    label_file: ${data.module.data_root_dir}/survival_labels.json
    split_file: ${data.module.data_root_dir}/splits.json
    image_suffix: .b2nd
    session_id: ses-DEFAULT
    target_shape: ${data.patch_size}
  cv:
    k: 5

  patch_size: [64, 64, 64]

fixed_survival_time_bins:
  cut_points_years: [1.0, 2.0, 3.0, 5.0]
  labels: [0-1y, 1-2y, 2-3y, 3-5y, 5y+]
  num_time_bins: 5

model:
  cifar_size: false
  input_channels: 2
  input_dim: 3
  input_shape: ${data.patch_size}
  optimizer: AdamW
  lr: 0.000005
  encoder_lr: 0.000005
  head_lr: 0.000005
  scheduler: CosineAnneal
  T_max: ${trainer.max_epochs}
  warmstart: 0
  warmstart2: 0
  weight_decay: 5e-2
  finetune_method: full_sawtooth
  resnet_dropout: 0.3
  num_time_bins: ${fixed_survival_time_bins.num_time_bins}
  survival_head_hidden_dim: 64
  survival_head_dropout: 0.5
  survival_head_norm: batchnorm
  survival_cut_points_years: ${fixed_survival_time_bins.cut_points_years}
  survival_landmark_years: ${fixed_survival_time_bins.cut_points_years}
  survival_smoothing_alpha: 0.05
  survival_loss:
    name: deephit
    alpha: 1.0                # HPARAM: [0.0, 1.0]. NLL<->ranking tradeoff:
                              # total = alpha*NLL + (1-alpha)*ranking.
                              # alpha=1 -> NLL only (ranking disabled); alpha=0 -> pure ranking.
    sigma: 0.1                # HPARAM (log): [0.01, 1.0]. Ranking kernel temperature.
  save_preds: true
  result_plot: null

trainer:
  logger:
    project: SSL3D_Survival
    name: survival_binary_alt
  accumulate_grad_batches: 4
  max_epochs: 200
  sync_batchnorm: true
  callbacks:
    checkpoint:
      filename: best-cindex-epoch{epoch}-Val_loss={Val/loss:.2f}-Val_C-index={Val/C-index:.4f}
      mode: max
      monitor: Val/C-index
      save_top_k: 3
    early_stopping:
      _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: Val/C-index
      mode: max
      patience: 50
      min_delta: 0.002

metrics: []
